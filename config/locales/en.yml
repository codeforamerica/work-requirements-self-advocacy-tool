          <p>A letter or other document showing that you receive the disability benefits you selected:</p>
        proof_of_education_html: |
          <h3>Proof of attending college, university, trade school, or high school</h3>
          <ul class="list--bulleted">
            <li>Financial aid papers, an enrollment letter, a transcript, or other documents showing that you’re enrolled at least half time.</li>
          </ul>
        proof_of_education_over_50_html: |
          <p>If you are <strong>enrolled in school at least half time</strong>, other SNAP rules apply. In addition to your other exemptions, also tell your SNAP agency if you:</p>
          <ul class="list--bulleted">
            <li>Have a work study job, or have been approved for work study that you intend to participate in, OR</li>
            <li>Care for a child younger than 12, and don’t have the child care you need for you to go to school and work</li>
            <li>Are a single parent enrolled full-time and taking care of a child under 12</li>
          </ul>
        proof_of_health_condition_html: |
          <h3>Proof of health conditions or disability</h3>
          <p>This proof can be helpful, <u>but may not be required</u>.</p>
          <ul class="list--bulleted">
            <li>A letter from a medical or mental health provider (for example, a doctor, nurse, social worker, or other medical professional) stating that your condition makes you unable to consistently work 20 hours per week, every week, OR</li>
            <li>A <a href="https://policies.ncdhhs.gov/wp-content/uploads/DSS-8209_Medical-Report-Form.pdf" target="_blank">North Carolina Medical Report form</a> that is completed, signed, and dated by a medical or mental health provider, a member of their staff, a social worker, or another professional.</li>
          </ul>
        proof_of_treatment_program_html: |
          <h3>Proof of your treatment program</h3>
          <p>A document from your treatment center or program, stating that you regularly participate.</p>
        proof_of_working_html: |
          <h3>Proof of working</h3>
          <p>Send in <strong>one</strong> of these verifications:</p>
          <ul class="list--bulleted">
            <li>Paystubs from the last month, OR</li>
            <li>A signed and dated letter from your employer with your expected hours and pay for the coming month, OR</li>
            <li>A signed and dated letter from your employer stating your hours and earnings for the last month (you might need this if you don’t have a paystub, for example, if you were paid in cash)</li>
            <li>If you’re self-employed (for example, if you do gig work, contract work, or run your own business), records showing how much you earned in the last month (such as bank statements or records from a gig work platform)</li>
          </ul>
        proof_you_may_need: Here is the proof you may need to submit to your agency.
        title: What’s next
