    work_rules_apply_unmet:
      edit:
        instructions_html: "<p>You can keep your benefits if you tell your agency that you are doing <strong>at least one</strong> of the following things:</p><ul class='list--bulleted'><li>Working, volunteering, or doing job training for a total of <strong>at least 20 hours a week, OR</strong></li><li>Earning <strong>at least $217.50 a week.</strong></li></ul><p>You can <strong>only get SNAP</strong> for 3 months until Dec. 31, 2027, when you are not doing one of those things.</p><p><strong>If you lose SNAP</strong> and then start doing one of those things, you can reapply for benefits. You can also <strong>reapply for SNAP</strong> if your situation changes so that the work rules don’t apply to you.</p><p><strong>If you start doing one of those things and you weren’t before,</strong> send proof to your SNAP agency.</p>"
        instructions_title: Avoid a time limit on your SNAP benefits
        title: You may need to follow the SNAP work rules
        title_help_text: If something changes about your situation and you cannot work at least 20 hours a week, every week, please tell your SNAP agency.
        unexpected_problems_html: Unexpected problems happen, like a family emergency or your car breaking down. If you have a "good cause" reason why you could not work 20 hours a week in a month, please let your SNAP agency know. If you have any documents you have that can help prove what happened, that can help them understand your situation.
        unexpected_problems_title: If you miss your hours in a month but you had a good reason, report it to your SNAP agency
