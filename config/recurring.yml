staging:
  clear_solid_queue_finished_jobs:
    command: "SolidQueue::Job.clear_finished_in_batches(sleep_between_batches: 0.3)"
    schedule: every hour at minute 12
  daily_survey_job:
    class: DailySurveyJob
#    schedule: every day at 7:25am America/Los_Angeles
    schedule: every day at 9:05am America/Los_Angeles

production:
  clear_solid_queue_finished_jobs:
    command: "SolidQueue::Job.clear_finished_in_batches(sleep_between_batches: 0.3)"
    schedule: every hour at minute 12
  daily_survey_job:
    class: DailySurveyJob
    schedule: every day at 7:05am America/Los_Angeles

development:
  daily_survey_job:
    class: DailySurveyJob
# Enable with a specific time (see above), or use an interval
